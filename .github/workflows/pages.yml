name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate Go
        run: go test ./...

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Validate web unit tests
        working-directory: web
        run: npm run test:unit

      - name: Validate public web guard
        working-directory: web
        run: npm run guard:oss-sensitive

      - name: Build publishable site
        run: bash scripts/build-pages-output.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-deployed:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Wait for deployed Pages URL
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error --location --max-time 20 "$PAGE_URL" >/dev/null; then
              exit 0
            fi
            echo "Waiting for Pages deploy to become reachable at $PAGE_URL (attempt $attempt/18)..."
            sleep 10
          done
          echo "Pages URL did not become reachable in time: $PAGE_URL" >&2
          exit 1

      - name: Verify deployed site
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run verify:pages:light
